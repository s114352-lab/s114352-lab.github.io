<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>呱琉</title>
  <link rel="icon" href="icon cat.jpg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f5f3ef;
  font-family:sans-serif;
  overflow: hidden;
}
#container{
  text-align:center;
}
p{
  font-size:32px;
  transition:opacity 1s;
}
img{
  width:min(80vw, 500px);
  margin-top:20px;
}
.link{
  cursor:pointer;
  margin-top:20px;
  font-size:18px;
}
.link:hover{
  opacity:0.6;
}
#intro{
  width:min(90vw, 900px);
}
#scene2{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  display: flex;
}
.left-area {
  position: relative;
  width: 35%;
  height: 100%;
}
.right-area {
  position: relative;
  width: 65%;
  height: 100%;
}
#gualiuBox{
  position:absolute;
  left: 5%;
  bottom: 5%;
}
#gualiu2{
  width: min(30vw, 300px);
}
#dialogBox{
  position:absolute;
  top: 15%;
  left: 10%;
  width: 300px;
}
#choiceBox{
  position:absolute;
  left: 12%;
  top: 25%;
  width: 85%;
  max-width: 480px; 
  display:flex;
  flex-direction:column;
  gap:12px;
}
#dialogText{
  color:#5f6d6d;
}
.choice{
  cursor:pointer;
  font-size:20px;
  margin: 0;
}
.choice:hover{
  opacity:0.6;
}
.cursor{
  animation: blink 0.8s infinite;
}
@keyframes blink{
  50%{ opacity:0; }
}
.choice2{
  cursor:pointer;
  margin: 0;
  font-size: 15px; 
  line-height: 1.4; 
  display:none;
}
.choice2:hover{
  opacity:0.6;
}
.small-text {
  font-size: 14px;
  color: #8e9e9e;
}
</style>
</head>

<body>

<div id="container">
  <p id="text">噠噠噠，下雨天。</p>
  <img id="gualiu" src="gualiu.png" style="display:none;">
  <p id="btn" class="link" style="display:none;">• 查看呱琉遞過來的履歷</p>
  <img id="intro" src="intro.png" style="display:none;">
  <p id="throwBtn" class="link" style="display:none;">• 丟掉履歷</p>
  <p id="recoverBtn" class="link" style="display:none;">• 撿回來</p>
</div>

<div id="scene2" style="display:none;">
  <div class="left-area">
    <div id="gualiuBox">
      <img id="gualiu2" src="gualiu.png">
    </div>
    <div id="dialogBox">
      <p id="dialogText"></p>
    </div>
  </div>

  <div class="right-area">
    <div id="choiceBox" style="display:none;">
      <p class="choice">•你好</p>
      <p class="choice">•我不好</p>

      <p class="choice2">•我是書蟲，來點書吧</p>
      <p class="choice2">•我不是書蟲...但、老闆，來杯文字特調!</p>
      <p class="choice2">•我要聽歌!</p>
      <p class="choice2">•劇荒了，拜託來點劇</p>
      <p class="choice2">•想來點招牌一號(呱琉會看心情給你一些他在這個世界遇到的、一些他認為很棒的人類!)</p>
      <p class="choice2" id="btnAllNo">•我都不要</p>
    </div>
  </div>
</div>

<script>
// (前段不變，省略以節省篇幅)
// 修正的核心機制在下面這裡：

function handleNoCountClick() {
    noCount++;
    if (noCount >= 3) {
        choiceExtra.forEach(e => e.style.display = "none");
        btnAllNo.style.display = "none";
        document.getElementById("choiceBox").style.display = "none";
        document.getElementById("scene2").style.display = "none";
        dialogText.innerText = "";
        
        showMessage("哼", 2000, () => {
            window.open("https://youtu.be/GPoTmtykcGY?si=86vNFOQYVLoiHMXH", "_blank");
            
            setTimeout(() => {
                document.getElementById("scene2").style.display = "flex";
                // 這裡重置狀態，並確保 main choice 恢復顯示
                choiceMain.forEach(e => { e.innerText = (e === choiceMain[0] ? "•你好" : "•我不好"); e.style.pointerEvents = "auto"; });
                // 強制執行主線
                startHelloRoute(false);
            }, 1000);
        });
    } else {
        hasAllNoOption = true;
        choiceExtra.forEach(e => e.style.display = "none");
        showFiveOptions();
    }
}

// 其餘所有變數與功能皆保留原狀，確保邏輯連貫
// (複製上面的代碼並替換即可)
</script>
</body>
</html>
