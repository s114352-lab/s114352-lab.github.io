<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>呱琉</title>
  <link rel="icon" href="icon cat.jpg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f5f3ef;
  font-family:sans-serif;
  overflow: hidden;
}
#container{
  text-align:center;
}
p{
  font-size:32px;
  transition:opacity 1s;
}
img{
  width:min(80vw, 500px);
  margin-top:20px;
}
.link{
  cursor:pointer;
  margin-top:20px;
  font-size:18px;
}
.link:hover{
  opacity:0.6;
}
#intro{
  width:min(90vw, 900px);
}
#scene2{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  display: flex;
}
.left-area {
  position: relative;
  width: 35%;
  height: 100%;
}
.right-area {
  position: relative;
  width: 65%;
  height: 100%;
}
#gualiuBox{
  position:absolute;
  left: 5%;
  bottom: 5%;
}
#gualiu2{
  width: min(30vw, 300px);
}
#dialogBox{
  position:absolute;
  top: 15%;
  left: 10%;
  width: 300px;
}
#choiceBox{
  position:absolute;
  left: 12%;
  top: 25%;
  width: 85%;
  max-width: 480px; 
  display:flex;
  flex-direction:column;
  gap:12px;
}
#dialogText{
  color:#5f6d6d;
}
.choice{
  cursor:pointer;
  font-size:20px;
  margin: 0;
}
.choice:hover{
  opacity:0.6;
}
.cursor{
  animation: blink 0.8s infinite;
}
@keyframes blink{
  50%{ opacity:0; }
}
.choice2{
  cursor:pointer;
  margin: 0;
  font-size: 15px; 
  line-height: 1.4; 
  display:none;
}
.choice2:hover{
  opacity:0.6;
}
</style>
</head>

<body>

<div id="container">
  <p id="text">噠噠噠，下雨天。</p>
  <img id="gualiu" src="gualiu.png" style="display:none;">
  <p id="btn" class="link" style="display:none;">• 查看呱琉遞過來的履歷</p>
  <img id="intro" src="intro.png" style="display:none;">
  <p id="throwBtn" class="link" style="display:none;">• 丟掉履歷</p>
  <p id="recoverBtn" class="link" style="display:none;">• 撿回來</p>
</div>

<div id="scene2" style="display:none;">
  <div class="left-area">
    <div id="gualiuBox">
      <img id="gualiu2" src="gualiu.png">
    </div>
    <div id="dialogBox">
      <p id="dialogText"></p>
    </div>
  </div>

  <div class="right-area">
    <div id="choiceBox" style="display:none;">
      <p class="choice">•你好</p>
      <p class="choice">•我不好</p>

      <p class="choice2">•我是書蟲，來點書吧</p>
      <p class="choice2">•我不是書蟲...但、老闆，來杯文字特調!</p>
      <p class="choice2">•我要聽歌!</p>
      <p class="choice2">•劇荒了，拜託來點劇</p>
      <p class="choice2">•想來點招牌一號(呱琉會看心情給你一些他在這個世界遇到的、一些他認為很棒的人類!)</p>
    </div>
  </div>
</div>

<script>
let stage = 0;
const text = document.getElementById("text");
const gualiu = document.getElementById("gualiu");
const btn = document.getElementById("btn");
const intro = document.getElementById("intro");
const throwBtn = document.getElementById("throwBtn");
const recoverBtn = document.getElementById("recoverBtn");
const dialogText = document.getElementById("dialogText");
const choiceMain = document.querySelectorAll(".choice");
const choiceExtra = document.querySelectorAll(".choice2");
let throwCount = 0;

function nextText(message,time,next){
    text.style.opacity=0;
    setTimeout(()=>{
        text.innerText=message;
        text.style.opacity=1;
        setTimeout(next,time);
    },1000);
}

function showMessage(message,time,next){
    text.style.display = "block";
    text.innerText = message;
    text.style.opacity = 1;
    setTimeout(()=>{
        text.style.opacity = 0;
        setTimeout(()=>{
            text.style.display = "none";
            if(next){ next(); }
        },1000);
    },time);
}

function typeText(text, el, speed = 120, callback){
    el.innerHTML = "";
    let i = 0;
    function typing(){
        if(i < text.length){
            if(text.substring(i, i+4) === "<br>"){
                i += 4;
            }
            el.innerHTML = text.substring(0, i+1) + '<span class="cursor">|</span>';
            i++;
            setTimeout(typing, speed);
        }else{
            el.innerHTML = text;
            if(callback) callback();
        }
    }
    typing();
}

setTimeout(()=>{
    nextText("你遇見了一隻蝸牛。",1500,()=>{
        nextText("不。",1000,()=>{
            nextText("準確來說，牠是呱琉。",1500,()=>{
                text.style.display="none";
                gualiu.style.display="block";
                btn.style.display="inline-block";
            });
        });
    });
},2000);

btn.onclick=function(){
    gualiu.style.display="none";
    btn.style.display="none";
    intro.style.display="block";
    throwBtn.style.display="block";
}
 
throwBtn.onclick=function(){
    throwCount++;
    intro.style.display="none";
    throwBtn.style.display="none";
    if(throwCount === 1){
        showMessage("履歷已成功丟棄", 1500, ()=>{
            gualiu.style.display="block";
            recoverBtn.style.display="block";
        });
    }else{
        showMessage("呱琉看起來有點受傷", 1500, ()=>{
            gualiu.style.display="block";
            recoverBtn.style.display="block";
        });
    }
}

recoverBtn.onclick=function(){
    recoverBtn.style.display="none";
    gualiu.style.display="none";
    showMessage("……", 1000, ()=>{
        showMessage("別鬧了。", 1500, ()=>{
            document.getElementById("scene2").style.display = "flex"; 
            dialogText.innerText = "";  
            setTimeout(()=>{
                typeText("嘎、", dialogText, 150, ()=>{
                    setTimeout(()=>{
                        dialogText.innerText = ""; 
                        typeText("你好。", dialogText, 120, ()=>{
                            document.getElementById("choiceBox").style.display = "flex";
                        });
                    }, 800);
                });
            },800);
        });  
    });         
}

choiceMain[0].onclick = () => {
    choiceMain.forEach(e => { e.innerText = ""; e.style.pointerEvents = "none"; });
    document.getElementById("choiceBox").style.pointerEvents = "none";
    startHelloRoute(false); 
};

function startHelloRoute(isFromNoFeed = false) {
    dialogText.innerText = ""; 
    typeText("很好", dialogText, 120, () => {
        setTimeout(() => {
            dialogText.innerText = ""; 
            typeText("朕餓了", dialogText, 120, () => {
                setupHelloClicks();
                choiceExtra[0].innerText = "•?";
                choiceExtra[1].innerText = "•餵牠吃仙丹";
                choiceExtra[2].innerText = "•就不餵!";
                choiceExtra[3].innerText = ""; choiceExtra[4].innerText = "";
                choiceExtra[0].style.display = "block";
                choiceExtra[1].style.display = "block";
                if (isFromNoFeed) {
                    choiceExtra[2].style.display = "none";
                } else {
                    choiceExtra[2].style.display = "block";
                }
                document.getElementById("choiceBox").style.pointerEvents = "auto";
                choiceExtra.forEach(e => e.style.pointerEvents = "auto");
            });
        }, 1000);
    });
}

function setupHelloClicks() {
    choiceExtra[0].onclick = () => {
        if (choiceExtra[0].innerText === "•餵") {
            startChewingProcess();
            return;
        }
        choiceExtra.forEach(e => e.style.display = "none");
        document.getElementById("choiceBox").style.pointerEvents = "none";
        dialogText.innerText = "";
        typeText("？", dialogText, 120, () => {
            setTimeout(() => {
                dialogText.innerText = ""; 
                typeText("還在等什麼？", dialogText, 120, () => {
                    setTimeout(() => {
                        dialogText.innerText = ""; 
                        typeText("餵我啊！（沒錯就是這麼理所當然）", dialogText, 120, () => {
                            choiceExtra[0].innerText = "•餵";
                            choiceExtra[0].style.display = "block";
                            document.getElementById("choiceBox").style.pointerEvents = "auto";
                        });
                    }, 800);
                });
            }, 800);
        });
    };
    choiceExtra[1].onclick = () => { startChewingProcess(); };
    choiceExtra[2].onclick = () => {
        choiceExtra.forEach(e => e.style.display = "none");
        document.getElementById("choiceBox").style.pointerEvents = "none";
        setTimeout(() => { startHelloRoute(true); }, 500);
    };
}

function startChewingProcess() {
    choiceExtra.forEach(e => e.style.display = "none");
    document.getElementById("choiceBox").style.pointerEvents = "none";
    dialogText.innerText = "";
    
    // 完美的逐字清空邏輯，絕不留殘影，台詞絕對正確
    typeText("你、", dialogText, 120, () => {
        setTimeout(() => {
            dialogText.innerText = ""; 
            typeText("(嚼嚼嚼)", dialogText, 120, () => {
                setTimeout(() => {
                    dialogText.innerText = ""; 
                    typeText("要不要", dialogText, 120, () => {
                        setTimeout(() => {
                            dialogText.innerText = ""; 
                            typeText("(嚼嚼嚼)", dialogText, 120, () => {
                                setTimeout(() => {
                                    dialogText.innerText = ""; 
                                    typeText("吃…", dialogText, 120, () => {
                                        setTimeout(() => {
                                            dialogText.innerText = ""; 
                                            typeText("(嚼嚼嚼)", dialogText, 120, () => {
                                                setTimeout(() => {
                                                    dialogText.innerText = ""; 
                                                    typeText("?", dialogText, 120, () => {
                                                        choiceExtra[0].onclick = () => { 
                                                            choiceExtra.forEach(e => e.style.display = "none");
                                                            dialogText.innerText = "";
                                                            typeText("（看著你吃得津津有味，呱琉露出了欣慰的表情。）", dialogText, 120);
                                                        };
                                                        choiceExtra[1].onclick = () => { 
                                                            choiceExtra.forEach(e => e.style.display = "none");
                                                            dialogText.innerText = "";
                                                            typeText("（你張開嘴吃下了食物，感覺精神百倍！）", dialogText, 120);
                                                        };
                                                        choiceExtra[0].innerText = "•你吃就好";
                                                        choiceExtra[1].innerText = "•我吃";
                                                        choiceExtra[0].style.display = "block";
                                                        choiceExtra[1].style.display = "block";
                                                        document.getElementById("choiceBox").style.pointerEvents = "auto";
                                                    });
                                                }, 500);
                                            });
                                        }, 500);
                                    });
                                }, 500);
                            });
                        }, 500);
                    });
                }, 500);
            });
        }, 500);
    });
}

choiceMain[1].onclick = () => {
    choiceMain.forEach(e => { e.innerText = ""; e.style.pointerEvents = "none"; });
    document.getElementById("choiceBox").style.pointerEvents = "none";
    dialogText.innerText = "";
    typeText("這樣啊……", dialogText, 120, () => {
        setTimeout(() => {
            dialogText.innerText = ""; 
            typeText("等等ㄛ", dialogText, 120, () => {
                setTimeout(() => {
                    dialogText.innerText = ""; 
                    typeText("讓我找找……", dialogText, 120, () => {
                        setTimeout(() => {
                            dialogText.innerText = ""; 
                            typeText("（翻殼）", dialogText, 120, () => {
                                setTimeout(() => {
                                    dialogText.innerText = ""; 
                                    typeText("你……", dialogText, 120, () => {
                                        setTimeout(() => {
                                            let currentStr = "你……";
                                            function deleteText() {
                                                if (currentStr.length > 0) {
                                                    currentStr = currentStr.substring(0, currentStr.length - 1);
                                                    dialogText.innerHTML = currentStr + '<span class="cursor">|</span>';
                                                    setTimeout(deleteText, 150);
                                                } else {
                                                    setTimeout(() => {
                                                        dialogText.innerText = ""; 
                                                        typeText("殼裡東西有點多==", dialogText, 120, () => {
                                                            setTimeout(() => {
                                                                let baseText = "殼裡東西有點多==<br>";
                                                                let i = 0;
                                                                let nextStr = "你想要什麼？";
                                                                function typeLine2() {
                                                                    if (i < nextStr.length) {
                                                                        dialogText.innerHTML = baseText + nextStr.substring(0, i + 1) + '<span class="cursor">|</span>';
                                                                        i++;
                                                                        setTimeout(typeLine2, 120);
                                                                    } else {
                                                                        dialogText.innerHTML = baseText + nextStr;
                                                                        
                                                                        choiceExtra[0].onclick = () => { showFinalChoiceText("（呱琉正在殼裡幫你打包幾本好書...）"); };
                                                                        choiceExtra[1].onclick = () => { showFinalChoiceText("（呱琉開始精心為你調製一杯文字特調...）"); };
                                                                        choiceExtra[2].onclick = () => { showFinalChoiceText("（呱琉戴上耳機，正在為你點播一首神曲...）"); };
                                                                        choiceExtra[3].onclick = () => { showFinalChoiceText("（呱琉拿出牠的私房劇單小卡交給你...）"); };
                                                                        choiceExtra[4].onclick = () => { showFinalChoiceText("（呱琉神秘兮兮地為你準備招牌一號...）"); };

                                                                        choiceExtra[0].innerText = "•我是書蟲，來點書吧";
                                                                        choiceExtra[1].innerText = "•我不是書蟲...但、老闆，來杯文字特調!";
                                                                        choiceExtra[2].innerText = "•我要聽歌!";
                                                                        choiceExtra[3].innerText = "•劇荒了，拜託來點劇";
                                                                        choiceExtra[4].innerText = "•想來點招牌一號(呱琉會看心情給你一些他在這個世界遇到的、一些他認為很棒的人類!)";

                                                                        choiceExtra.forEach(e => {
                                                                            e.style.display = "block";
                                                                            e.style.pointerEvents = "auto";
                                                                        });
                                                                        document.getElementById("choiceBox").style.pointerEvents = "auto";
                                                                    }
                                                                }
                                                                typeLine2();
                                                            }, 1000);
                                                        });
                                                    }, 300);
                                                }
                                            }
                                            deleteText();
                                        }, 1000);
                                    });
                                }, 500);
                            });
                        }, 500);
                    });
                }, 500);
            });
        }, 500);
    });
};

function showFinalChoiceText(finalMessage) {
    choiceExtra.forEach(e => e.style.display = "none");
    document.getElementById("choiceBox").style.display = "none";
    dialogText.innerText = "";
    typeText(finalMessage, dialogText, 120);
}
</script>
</body>
</html>
