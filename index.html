<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>呱琉</title>
  <link rel="icon" href="icon cat.jpg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: block;
      background: #f5f3ef;
      font-family: sans-serif;
      overflow: hidden;
    }
    #container {
      text-align: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90vw;
      max-width: 900px;
    }
    p {
      font-size: 36px;
      transition: opacity 1s;
      margin: 15px 0;
    }
    #gualiu {
      width: min(85vw, 400px); 
      margin: 20px auto;
      display: none;
    }
    .link {
      cursor: pointer;
      margin-top: 25px;
      font-size: 22px;
    }
    .link:hover {
      opacity: 0.6;
    }
    #intro {
      width: min(95vw, 900px);
      margin: 0 auto;
    }
    #scene2 {
      display: none; 
      position: fixed;
      width: 100vw;
      height: 100vh;
      top: 0;
      left: 0;
      box-sizing: border-box;
    }
    #dialogBox {
      position: absolute;
      top: 22%;
      left: 28%;
      white-space: nowrap;
    }
    #dialogText {
      font-family: "Consolas", "Courier New", monospace;
      letter-spacing: 1px;
      color: #5f6d6d;
      font-size: 36px;
    }
    #gualiuBox {
      position: absolute;
      left: 24%;   
      bottom: 6%;  
      z-index: 5;  
    }
    #gualiu2 {
      width: min(55vw, 520px); 
      display: block;
    }
    #choiceBox {
      position: absolute;
      right: 28%;
      top: 42%;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: flex-start;
      max-width: 320px;
    }
    .choice {
      cursor: pointer;
      font-size: 28px; 
      margin: 0;
      color: #2c3e50;
      line-height: 1.4;
      text-align: left; 
    }
    .choice:hover {
      opacity: 0.6;
    }
    .choice2 {
      cursor: pointer;
      margin: 0;
      font-size: 23px; 
      line-height: 1.5; 
      display: none;
      color: #2c3e50;
      text-align: left; 
    }
    .choice2:hover {
      opacity: 0.6;
    }
    .indent-text {
      display: block;
      padding-left: 1.2em;
      font-size: 20px;
      color: #556666;
    }
    .cursor {
      animation: blink 0.8s infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    .small-text {
      font-size: 16px;
      color: #8e9e9e;
    }
    #footerNote {
      position: fixed;
      right: 18px;
      bottom: 12px;
      font-size: 14px;
      line-height: 1.6;
      color: #8e9e9e;
      text-align: right;
      opacity: 0.75;
      z-index: 999;
    }
  </style>
</head>

<body>

  <div id="container">

    <img id="gualiu" src="gualiu.png">
    <p id="btn" class="link" style="display:none;">• 查看呱琉遞過來的履歷</p>
    <img id="intro" src="intro.png" style="display:none;">
    <p id="throwBtn" class="link" style="display:none;">• 丟掉履歷</p>
    <p id="recoverBtn" class="link" style="display:none;">• 撿回來</p>
  </div>

  <div id="scene2">
    <div id="dialogBox">
      <p id="dialogText"></p>
    </div>
    <div id="gualiuBox">
      <img id="gualiu2" src="gualiu.png">
    </div>
    <div id="choiceBox" style="display:none;">
      <p class="choice">•你好</p>
      <p class="choice">•我不好</p>
      <p class="choice2"></p>
      <p class="choice2"></p>
      <p class="choice2"></p>
      <p class="choice2"></p>
      <p class="choice2"></p>
      <p class="choice2" id="btnAllNo" style="display:none;">•我都不要</p>
    </div>
  </div>

  <div id="footerNote">
    ──────────────<br>
    本殼還在擴建中。<br><br>
    
    若發現 𝔹𝕦𝕘，<br>
    請不要戳它。<br><br>
    
    因為牠可能是住民。<br>
    ──────────────
  </div>

  <script>
    let stage = 0;
    const text = document.getElementById("text");
    const gualiu = document.getElementById("gualiu");
    const btn = document.getElementById("btn");
    const intro = document.getElementById("intro");
    const throwBtn = document.getElementById("throwBtn");
    const recoverBtn = document.getElementById("recoverBtn");
    const dialogText = document.getElementById("dialogText");
    const choiceMain = document.querySelectorAll(".choice");
    const choiceExtra = document.querySelectorAll(".choice2");
    const btnAllNo = document.getElementById("btnAllNo");
    let throwCount = 0;
    let hasPressedNo = false; 
    let noCount = 0; 
    let currentCategory = ""; 
    let typingTimeout = null;
    let isPageVisible = true;
    let currentTypingParams = null; 

    const musicPool = [
      "〈鬼ノ宴〉——cover.穆恩佐",
      "〈愛情的騙子我問你〉——cover.瓦西瓦瓦",
      "〈舞女〉——陳小雲",
      "〈Doll〉——i-dle",
      "〈아로하 Aloha〉——조정석 CHO JUNG SEOK",
      "〈Fate〉——idle",
      "〈Love Story 〉——Taylor Swift",
      "〈It's My Lfe (Drama Version)〉——Mido and Falasol",
      "〈HER〉——MINNIE",
      "〈휘파람(whistle)〉——BLACKPINK",
      "〈文学講義/水槽-Cover〉——涅爾菲 Nyrfier",
      "〈FREAK〉——YUQI",
      "〈Radio〉——YUQI",
      "〈Mono〉——i-dle",
      "〈ガランド/ピコン-(Cover)〉——Eve",
      "〈雲中月圓〉——王識賢和孫淑媚",
      "〈新男性的復仇〉——董事長樂團",
      "〈愛拚才會贏〉——葉啟田",
      "〈大海〉——張雨生",
      "〈Older〉——薩莎•斯隆",
      "〈Titanium〉——Madilyn Bailey",
      "〈Big Big World〉——艾米麗亞",
      "〈Teeth〉— 5 seconds of summer",
      "〈Always Remember Us This Way〉——Lady Gaga",
      "〈The Joker And Queen (合作演出：Taylor Swift)〉——Ed Sheeran",
      "〈Shallow〉—— Lady Gaga",
      "〈Stars Align〉——蔡依林",
      "〈童話〉——光良"
    ];

    function nextText(message, time, next) {
      text.style.opacity = 0;
      setTimeout(() => {
        text.innerText = message;
        text.style.opacity = 1;
        setTimeout(next, time);
      }, 1000);
    }

    function showMessage(message, time, next) {
      text.style.display = "block";
      text.innerText = message;
      text.style.opacity = 1;
      setTimeout(() => {
        text.style.opacity = 0;
        setTimeout(() => {
          text.style.display = "none";
          if (next) { next(); }
        }, 1000);
      }, time);
    }

    function typeText(textHtml, el, speed = 120, callback) {
      clearTimeout(typingTimeout);
      let doc = new Bureaucrat(textHtml);
      let i = 0;
      currentTypingParams = { textHtml, el, speed, callback, doc, currentIndex: i };
      function typing() {
        if (!isPageVisible) return; 
        i = currentTypingParams.currentIndex;
        if (i < doc.length) {
          el.innerHTML = doc.substring(0, i + 1) + '<span class="cursor">|</span>';
          currentTypingParams.currentIndex++;
          typingTimeout = setTimeout(typing, speed);
        } else {
          el.innerHTML = textHtml;
          currentTypingParams = null; 
          if (callback) callback();
        }
      }
      typing();
    }

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        isPageVisible = false;
        clearTimeout(typingTimeout); 
      } else {
        isPageVisible = true;
        if (currentTypingParams) {
          let doc = currentTypingParams.doc;
          let el = currentTypingParams.el;
          let speed = currentTypingParams.speed;
          let textHtml = currentTypingParams.textHtml;
          let callback = currentTypingParams.callback;
          function resumeTyping() {
            if (!isPageVisible) return;
            let i = currentTypingParams.currentIndex;
            if (i < doc.length) {
              el.innerHTML = doc.substring(0, i + 1) + '<span class="cursor">|</span>';
              currentTypingParams.currentIndex++;
              typingTimeout = setTimeout(resumeTyping, speed);
            } else {
              el.innerHTML = textHtml;
              currentTypingParams = null;
              if (callback) callback();
            }
          }
          resumeTyping();
        }
      }
    });

    function Bureaucrat(html) {
      let arr = [];
      let i = 0;
      while (i < html.length) {
        if (html[i] === '<') {
          let end = html.indexOf('>', i);
          let tag = html.substring(i, end + 1);
          arr.push({ type: 'tag', val: tag });
          i = end + 1;
        } else {
          arr.push({ type: 'text', val: html[i] });
          i++;
        }
      }
      this.length = arr.filter(e => e.type === 'text').length;
      this.substring = function (start, endLen) {
        let res = "";
        let textCount = 0;
        for (let j = 0; j < arr.length; j++) {
          if (arr[j].type === 'tag') {
            res += arr[j].val;
          } else {
            if (textCount < endLen) {
              res += arr[j].val;
              textCount++;
            } else {
              break;
            }
          }
        }
        return res;
      };
    }

    setTimeout(() => {
      nextText("你遇見了一隻蝸牛。", 1500, () => {
        nextText("不。", 1000, () => {
          nextText("準確來說，牠是呱琉。", 1500, () => {
            text.style.display = "none";
            gualiu.style.display = "block";
            btn.style.display = "inline-block";
          });
        });
      });
    }, 2000);

    btn.onclick = function () {
      gualiu.style.display = "none";
      btn.style.display = "none";
      intro.style.display = "block";
      throwBtn.style.display = "block";
    }

    throwBtn.onclick = function () {
      throwCount++;
      intro.style.display = "none";
      throwBtn.style.display = "none";
      if (throwCount === 1) {
        showMessage("履歷已成功丟棄", 1500, () => {
          gualiu.style.display = "block";
          recoverBtn.style.display = "block";
        });
      } else {
        showMessage("呱琉看起來有點受傷", 1500, () => {
          gualiu.style.display = "block";
          recoverBtn.style.display = "block";
        });
      }
    }

    recoverBtn.onclick = function () {
      recoverBtn.style.display = "none";
      gualiu.style.display = "none";
      showMessage("……", 1000, () => {
        showMessage("別鬧了。", 1500, () => {
          document.getElementById("container").style.display = "none";
          document.getElementById("scene2").style.display = "block"; 
          dialogText.innerText = "";  
          setTimeout(() => {
            typeText("嘎、", dialogText, 150, () => {
              setTimeout(() => {
                dialogText.innerText = ""; 
                typeText("你好。", dialogText, 120, () => {
                  document.getElementById("choiceBox").style.display = "flex";
                });
              }, 800);
            });
          }, 800);
        }); 
      });         
    }

    choiceMain[0].onclick = () => {
      choiceMain.forEach(e => { e.innerText = ""; e.style.pointerEvents = "none"; });
      document.getElementById("choiceBox").style.pointerEvents = "none";
      startHelloRoute(); 
    };

    function startHelloRoute(isFromNoFeed = false) {
      dialogText.innerText = ""; 
      typeText("很好", dialogText, 120, () => {
        setTimeout(() => {
          dialogText.innerText = ""; 
          typeText("朕餓了", dialogText, 120, () => {
            document.getElementById("choiceBox").style.display = "flex";
            choiceExtra[0].onclick = () => {
              clearMenuAndPrepareBox();
              typeText("?", dialogText, 120, () => {
                setTimeout(() => {
                  dialogText.innerText = "";
                  typeText("還在等什麼?", dialogText, 120, () => {
                    setTimeout(() => {
                      dialogText.innerText = "";
                      typeText("餵我啊!(沒錯就是這麼理所當然)", dialogText, 120, () => {
                        setTimeout(() => {
                          for (let j = 0; j < 6; j++) { choiceExtra[j].style.display = "none"; }
                          btnAllNo.style.display = "none";
                          choiceExtra[0].innerText = "•餵";
                          choiceExtra[0].style.display = "block";
                          choiceExtra[0].style.pointerEvents = "auto";
                          choiceExtra[0].onclick = () => {
                            clearMenuAndPrepareBox();
                            startChewingProcess();
                          };
                          document.getElementById("choiceBox").style.pointerEvents = "auto";
                        }, 1500);
                      });
                    }, 1000);
                  });
                }, 1000);
              });
            };

            choiceExtra[1].onclick = () => {
              clearMenuAndPrepareBox();
              startChewingProcess(); 
            };

            choiceExtra[2].onclick = () => {
              clearMenuAndPrepareBox();
              startHelloRoute(true); 
            };
               
            choiceExtra[0].innerText = "•?";
            choiceExtra[1].innerText = "•餵牠吃仙丹";
            choiceExtra[2].innerText = "•就不餵!";
            choiceExtra[3].innerText = ""; choiceExtra[4].innerText = "";
            choiceExtra[0].style.display = "block";
            choiceExtra[1].style.display = "block";
                
            if (isFromNoFeed) {
              choiceExtra[2].style.display = "none";
            } else {
              choiceExtra[2].style.display = "block";
            }
            btnAllNo.style.display = "none";
            document.getElementById("choiceBox").style.pointerEvents = "auto";
            choiceExtra.forEach(e => e.style.pointerEvents = "auto");
          });
        }, 1000);
      });
    }

    function startChewingProcess() {
      dialogText.innerText = "";
      typeText("你、", dialogText, 120, () => {
        setTimeout(() => {
          dialogText.innerText = "";
          typeText("(嚼嚼嚼)", dialogText, 120, () => {
            setTimeout(() => {
              dialogText.innerText = "";
              typeText("要不要", dialogText, 120, () => {
                setTimeout(() => {
                  dialogText.innerText = ""; 
                  typeText("(嚼嚼嚼)", dialogText, 120, () => {
                    setTimeout(() => {
                      dialogText.innerText = ""; 
                      typeText("吃…", dialogText, 120, () => {
                        setTimeout(() => {
                          dialogText.innerText = ""; 
                          typeText("(嚼嚼嚼)", dialogText, 120, () => {
                            setTimeout(() => {
                              dialogText.innerText = ""; 
                              typeText("?", dialogText, 120, () => {
                                choiceExtra[0].onclick = () => { 
                                  clearMenuAndPrepareBox();
                                  typeText("不行，你得吃（塞", dialogText, 120, () => {
                                    setTimeout(triggerAscension, 1500);
                                  });
                                };
                                choiceExtra[1].onclick = () => { 
                                  clearMenuAndPrepareBox();
                                  triggerAscension();
                                };
                                choiceExtra[0].innerText = "•你吃就好";
                                choiceExtra[1].innerText = "•我吃";
                                choiceExtra[0].style.display = "block";
                                choiceExtra[1].style.display = "block";
                                document.getElementById("choiceBox").style.pointerEvents = "auto";
                              });
                            }, 500);
                          });
                        }, 500);
                      });
                    }, 500);
                  });
                }, 500);
              });
            }, 500);
          });
        }, 500);
      });
    }
  
    function triggerAscension() {
      document.getElementById("scene2").style.display = "none";
      dialogText.innerText = "";
      document.getElementById("container").style.display = "block"; 
      showMessage("你成仙了。", 2500);
    }

    choiceMain[1].onclick = () => {
      choiceMain.forEach(e => { e.innerText = ""; e.style.pointerEvents = "none"; });
      openSubMenu();
    };

    function openSubMenu() {
      document.getElementById("choiceBox").style.pointerEvents = "none";
      dialogText.innerText = "";
      typeText("這樣啊……", dialogText, 120, () => {
        setTimeout(() => {
          dialogText.innerText = ""; 
          typeText("等等ㄛ", dialogText, 120, () => {
            setTimeout(() => {
              dialogText.innerText = ""; 
              typeText("讓我找找……", dialogText, 120, () => {
                setTimeout(() => {
                  dialogText.innerText = ""; 
                  typeText("（翻殼）", dialogText, 120, () => {
                    setTimeout(() => {
                      dialogText.innerText = ""; 
                      let originalStr = "你……";
                      let forwardIndex = 0;
                      function typeForward() {
                        if (forwardIndex < originalStr.length) {
                          forwardIndex++;
                          dialogText.innerHTML = originalStr.substring(0, forwardIndex) + '<span class="cursor">|</span>';
                          setTimeout(typeForward, 120); 
                        } else {
                          setTimeout(startDeleting, 800);
                        }
                      }
                      let currentStr = originalStr;
                      function startDeleting() {
                        if (currentStr.length > 0) {
                          currentStr = currentStr.substring(0, currentStr.length - 1);
                          dialogText.innerHTML = currentStr + '<span class="cursor">|</span>';
                          setTimeout(startDeleting, 150); 
                        } else {
                          dialogText.innerText = "";
                          setTimeout(goToNextPart, 500);
                        }
                      }
                      function goToNextPart() {
                        typeText("殼裡東西有點多==", dialogText, 120, () => {
                          setTimeout(() => {
                            let baseText = "殼裡東西有點多==<br>";
                            let i = 0;
                            let nextStr = "你想要什麼？";
                            function typeLine2() {
                              if (i < nextStr.length) {
                                dialogText.innerHTML = baseText + nextStr.substring(0, i + 1) + '<span class="cursor">|</span>';
                                i++;
                                setTimeout(typeLine2, 120);
                              } else {
                                dialogText.innerHTML = baseText + nextStr;
                                showFiveOptions();
                              }
                            }
                            typeLine2();
                          }, 1000);
                        });
                      }
                      typeForward();
                    }, 1000);
                  });
                }, 500);
              });
            }, 500);
          });
        }, 500);
      });
    }

    function showFiveOptions() {
      document.getElementById("choiceBox").style.top = "35%";
      document.getElementById("choiceBox").style.right = "22%";
      choiceExtra[0].innerText = "•我是書蟲，來點書吧";
      choiceExtra[1].innerText = "•我不是書蟲...但、老闆，來杯文字特調!";
      choiceExtra[2].innerText = "•我要聽歌!";
      choiceExtra[3].innerText = "•劇荒了，拜託來點劇";
      for (let j = 0; j < 4; j++) {
        choiceExtra[j].style.display = "block";
        choiceExtra[j].style.pointerEvents = "auto";
      }
      choiceExtra[0].onclick = handleBookworm;
      choiceExtra[1].onclick = handleNotBookworm;
      choiceExtra[2].onclick = handleListenMusic;
      choiceExtra[3].onclick = handleNoDramas;
      if (hasPressedNo) {
        btnAllNo.style.display = "block";
        btnAllNo.style.pointerEvents = "auto";
        btnAllNo.onclick = () => {
          choiceExtra.forEach(e => e.style.display = "none");
          btnAllNo.style.display = "none";
          document.getElementById("choiceBox").style.pointerEvents = "none";
          dialogText.innerText = "";
          typeText("你心情不錯嘛", dialogText, 120, () => {
            setTimeout(() => {
              startHelloRoute(false);
            }, 1500);
          });
        };
      } else {
        btnAllNo.style.display = "none";
      }
    }

    document.getElementById("choiceBox").style.display = "flex";
    document.getElementById("choiceBox").style.pointerEvents = "auto";

    function handleBookworm() {
      currentCategory = "book"; 
      clearMenuAndPrepareBox();
      const pool = [
        (cb) => { typeText("貓戰士《Warriors》!<br><span class='small-text'>溫馨提示：本系列為大胃王套餐<br>如果你不像呱琉一樣這麼閒這麼能吃，建議不要</span>", dialogText, 120, cb); },
        (cb) => { typeText("《特殊傳說》——by護玄大大<br>本呱也還在看ing", dialogText, 120, cb); },
        (cb) => { typeText("《兔俠》——by護玄", dialogText, 120, cb); },
        (cb) => {
          typeText("《紅樓夢》<br>四大名著，必須看一下吧。", dialogText, 120, () => {
            setTimeout(() => {
              let currentHtml = dialogText.innerHTML;
              dialogText.innerHTML = currentHtml + "<br><span class='small-text'>雖然本呱也才看五回（小聲</span>";
              if (cb) cb();
            }, 800);
          });
        }
      ];
      let randomIdx = Math.floor(Math.random() * pool.length);
      pool[randomIdx](() => { showPostBranchOptions(["•看過了", "•好看愛看", "•會空的", "•我不要"]); });
    }

    function handleNotBookworm() {
      currentCategory = "special"; 
      clearMenuAndPrepareBox();
      const pool = [
        (cb) => { typeText("我推薦、<br>《世界上最透明的故事》！", dialogText, 120, cb); },
        (cb) => { typeText("《戀家的人》——井田千秋老師<br>痾……誰說彩漫不行了？<br>也有文字阿（嘴硬", dialogText, 120, cb); },
        (cb) => {
          typeText("羅德•達爾系列童書（？", dialogText, 120, () => {
            setTimeout(() => {
              let baseHtml = dialogText.innerHTML;
              typeText("很好看啦！<br>真的！", dialogText, 120, () => {
                setTimeout(() => {
                  dialogText.innerHTML = baseHtml; 
                  setTimeout(() => {
                    typeText("我不會放棄繼續推薦你童書的！", dialogText, 120, cb);
                  }, 500);
                }, 1200);
              });
            }, 800);
          });
        },
        (cb) => {
          typeText("《在魔王城說晚安》", dialogText, 120, () => {
            setTimeout(() => {
              let tempBox = document.createElement("div");
              dialogText.appendChild(tempBox);
              typeText("不知道啊，烏龜說好看那你就去看！", tempBox, 120, () => {
                setTimeout(() => {
                  tempBox.innerHTML = ""; 
                  setTimeout(() => {
                    typeText("什麼？<br>你說烏龜是誰？<br>罰你重看履歷！", tempBox, 120, cb);
                  }, 500);
                }, 1200);
              });
            }, 800);
          });
        }
      ];
      let randomIdx = Math.floor(Math.random() * pool.length);
      pool[randomIdx](() => { showPostBranchOptions(["•看過了", "•好看愛看", "•會看的", "•我不要"]); });
    }

    function handleListenMusic() {
      currentCategory = "music"; 
      clearMenuAndPrepareBox();
      let randomIdx = Math.floor(Math.random() * musicPool.length);
      let chosenMusic = musicPool[randomIdx];
      typeText("我推薦這首：<br>" + chosenMusic, dialogText, 120, () => { 
        showPostBranchOptions(["•聽過了", "•好聽愛聽", "•我不要"]); 
      });
    }

    function handleNoDramas() {
      currentCategory = "drama"; 
      clearMenuAndPrepareBox();
      const pool = [
        (cb) => { typeText("《機智醫師生活》", dialogText, 120, cb); },
        (cb) => { typeText("《大力女子都奉順》", dialogText, 120, cb); },
        (cb) => { typeText("《法醫女王》", dialogText, 120, cb); },
        (cb) => { typeText("《成何體統》-丞磊王楚然", dialogText, 120, cb); }
      ];
      let randomIdx = Math.floor(Math.random() * pool.length);
      pool[randomIdx](() => { showPostBranchOptions(["•看過了", "•會看的", "•我不要"]); });
    }

    function clearMenuAndPrepareBox() {
      choiceExtra.forEach(e => e.style.display = "none");
      btnAllNo.style.display = "none";
      document.getElementById("choiceBox").style.pointerEvents = "none";
      dialogText.innerText = "";
    }

    function startComfortRoute() {
      dialogText.innerText = "";
      typeText("希望這樣你有好一點", dialogText, 120, () => {
        setTimeout(() => {
          for (let j = 0; j < 6; j++) { choiceExtra[j].style.display = "none"; }
          btnAllNo.style.display = "none";
          choiceExtra[0].innerText = "•有";
          choiceExtra[1].innerText = "•沒有(的相反)";
          choiceExtra[0].style.display = "block";
          choiceExtra[1].style.display = "block";
          choiceExtra[0].style.pointerEvents = "auto";
          choiceExtra[1].style.pointerEvents = "auto";
          choiceExtra[0].onclick = () => {
            clearMenuAndPrepareBox();
            startHelloRoute(false);
          };
          choiceExtra[1].onclick = () => {
            clearMenuAndPrepareBox();
            startHelloRoute(false);
          };
          document.getElementById("choiceBox").style.pointerEvents = "auto";
        }, 500);
      });
    }

    function showPostBranchOptions(btnLabels) {
      const choiceBox = document.getElementById("choiceBox");
      if (choiceBox) {
        choiceBox.style.display = "flex"; 
      }
      btnLabels.forEach((label, index) => {
        choiceExtra[index].innerText = label;
        choiceExtra[index].style.display = "block";
        choiceExtra[index].style.pointerEvents = "auto";
        if (label === "•聽過了") {
          choiceExtra[index].onclick = () => {
            clearMenuAndPrepareBox();
            typeText("那就再聽一次", dialogText, 120, () => {
              setTimeout(() => {
                for (let j = 0; j < 6; j++) { choiceExtra[j].style.display = "none"; }
                btnAllNo.style.display = "none";
                choiceExtra[0].innerText = "•喔";
                choiceExtra[0].style.display = "block";
                choiceExtra[0].style.pointerEvents = "auto";
                if (choiceBox) choiceBox.style.display = "flex";
                choiceExtra[0].onclick = () => {
                  clearMenuAndPrepareBox();
                  showFiveOptions();
                };
                if (choiceBox) choiceBox.style.pointerEvents = "auto";
              }, 500);
            });
          };
        } else if (label === "•看過了") {
          choiceExtra[index].onclick = () => { showFiveOptions(); };
        } else if (label === "•好看愛看" || label === "•會看的" || label === "•好聽愛聽") {
          choiceExtra[index].onclick = () => {
            clearMenuAndPrepareBox();
            startComfortRoute(); 
          };
        } else if (label === "•我不要") {
          choiceExtra[index].onclick = () => {
            hasPressedNo = true; 
            noCount++; 
            if (noCount >= 3) {
              choiceExtra.forEach(e => e.style.display = "none");
              if (choiceBox) choiceBox.style.pointerEvents = "none";
              window.open("https://youtu.be/GPoTmtykcGY?si=wCudsn9CWbVUN8ib", "_blank");
              dialogText.innerText = "";
              typeText("你心情不錯嘛", dialogText, 120, () => {
                setTimeout(() => {
                  startHelloRoute(false); 
                }, 1500);
              });
            } else {
              showFiveOptions();
            }
          };
        }
      });
      if (choiceBox) choiceBox.style.pointerEvents = "auto";
    }
  </script>
</body>
</html>
