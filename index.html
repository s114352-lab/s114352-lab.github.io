<!doctype html>
<html>
  <head>
    <meta charset = "utf-8">
    <title>呱琉</title>
    <link rel="icon" href="icon cat.jpg">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f3ef;
    font-family:sans-serif;}

#container{
    text-align:center;
}

p{
    font-size:32px;
    transition:opacity 1s;
}
  
img{
    width:min(80vw, 500px);
    margin-top:20px;
}

button{
    margin-top:20px;
    padding:10px 20px;
}
.link{
    cursor:pointer;
    margin-top:20px;
    font-size:18px;
}

.link:hover{
    opacity:0.6;
}

  #intro{
    width:min(90vw, 900px);
}
</style>

</head>

<body>

<div id="container">

<p id="text">噠噠噠，下雨天。</p>

<img id="gualiu" src="gualiu.png" style="display:none;">

<p id="btn" class="link" style="display:none;">
• 查看呱琉遞過來的履歷
</p>

<img id="intro" src="intro.png" style="display:none;">

<p id="throwBtn" class="link" style="display:none;">
• 丟掉履歷
</p>


<p id="recoverBtn" class="link" style="display:none;">
• 撿回來
</p>


  
</div>

<script>

const text = document.getElementById("text");
const gualiu = document.getElementById("gualiu");
const btn = document.getElementById("btn");
const intro = document.getElementById("intro");
  const throwBtn = document.getElementById("throwBtn");
const recoverBtn = document.getElementById("recoverBtn");


let throwCount = 0;

function nextText(message,time,next){

    text.style.opacity=0;

    setTimeout(()=>{

        text.innerText=message;
        text.style.opacity=1;

        setTimeout(next,time);

    },1000);
}

  function showMessage(message,time,next){

    text.style.display = "block";
    text.innerText = message;
    text.style.opacity = 1;

    setTimeout(()=>{

        text.style.opacity = 0;

        setTimeout(()=>{

            text.style.display = "none";

            if(next){
                next();
            }

        },1000);

    },time);

}

setTimeout(()=>{

    nextText("你遇見了一隻蝸牛。",1500,()=>{

        nextText("不。",1000,()=>{

            nextText("準確來說，牠是呱琉。",1500,()=>{

                text.style.display="none";

                gualiu.style.display="block";
                btn.style.display="inline-block";

            });

        });

    });

},2000);


btn.onclick=function(){

    gualiu.style.display="none";
    btn.style.display="none";

    intro.style.display="block";
    throwBtn.style.display="block";
}

 
throwBtn.onclick=function(){

    throwCount++;

    intro.style.display="none";
    throwBtn.style.display="none";

    if(throwCount === 1){

        showMessage(
            "履歷已成功丟棄",
            1500,
            ()=>{

                gualiu.style.display="block";
                recoverBtn.style.display="block";

            }
        );

    }

    else{

        showMessage(
            "呱琉看起來有點受傷",
            1500,
            ()=>{

                gualiu.style.display="block";
                recoverBtn.style.display="block";

            }
        );

    }

}
  recoverBtn.onclick=function(){

    recoverBtn.style.display="none";

    if(throwCount < 2){

        gualiu.style.display="none";

        intro.style.display="block";
        throwBtn.style.display="block";

    }

    else{

        gualiu.style.display="none";

        showMessage(
            "……",
            1000,
            ()=>{

                showMessage(
                    "別鬧了。",
                    1500,
                    ()=>{

                        // 下一階段寫這裡

                    }
                );

            }
        );

    }

}
</script>

</body>
</html>
