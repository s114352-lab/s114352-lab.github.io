<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>呱琉</title>
  <link rel="icon" href="icon cat.jpg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  display:block;
  background:#f5f3ef;
  font-family:sans-serif;
  overflow: hidden;
}

#container{
  text-align:center;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90vw;
  max-width: 900px;
}

p{
  font-size:36px;
  transition:opacity 1s;
  margin: 15px 0;
}

#gualiu{
  width:min(85vw, 400px); 
  margin: 20px auto;
  display: none;
}

.link{
  cursor:pointer;
  margin-top:25px;
  font-size:22px;
}

.link:hover{ opacity:0.6; }

#intro{
  width:min(95vw, 900px);
  margin: 0 auto;
}

#scene2{
  display: none; 
  position: fixed;
  width: 100vw;
  height: 100vh;
  top: 0;
  left: 0;
}

#dialogBox{
  position: absolute;
  top: 22%;
  left: 28%;
}

#dialogText{
  font-family: "Consolas","Courier New", monospace;
  letter-spacing: 1px;
  color:#5f6d6d;
  font-size:36px;
}

#gualiuBox{
  position: absolute;
  left: 24%;
  bottom: 6%;
}

#choiceBox{
  position:absolute;
  right:28%;
  top:42%;
  display:flex;
  flex-direction:column;
  gap:18px;
  align-items:flex-start;
}

.choice{
  cursor:pointer;
  font-size:28px;
  color:#2c3e50;
}

.choice2{
  cursor:pointer;
  font-size:23px;
  display:none;
}

.cursor{ animation: blink 0.8s infinite; }
@keyframes blink{50%{opacity:0;}}

</style>
</head>

<body>

<div id="container">
  <p id="text">噠噠噠，下雨天。</p>
  <img id="gualiu" src="gualiu.png">
  <p id="btn" class="link" style="display:none;">• 查看呱琉遞過來的履歷</p>
  <img id="intro" style="display:none;" src="intro.png">
  <p id="throwBtn" class="link" style="display:none;">• 丟掉履歷</p>
  <p id="recoverBtn" class="link" style="display:none;">• 撿回來</p>
</div>

<div id="scene2">
  <div id="dialogBox"><p id="dialogText"></p></div>

  <div id="gualiuBox">
    <img id="gualiu2" src="gualiu.png">
  </div>

  <div id="choiceBox" style="display:none;">
    <p class="choice">•你好</p>
    <p class="choice">•我不好</p>

    <p class="choice2"></p>
    <p class="choice2"></p>
    <p class="choice2"></p>
    <p class="choice2"></p>
    <p class="choice2"></p>
  </div>
</div>

<script>
let text = document.getElementById("text");
let gualiu = document.getElementById("gualiu");
let btn = document.getElementById("btn");
let intro = document.getElementById("intro");
let throwBtn = document.getElementById("throwBtn");
let recoverBtn = document.getElementById("recoverBtn");
let dialogText = document.getElementById("dialogText");
let choiceMain = document.querySelectorAll(".choice");
let choiceExtra = document.querySelectorAll(".choice2");

function typeText(str, el, speed=120, cb){
  let i=0;
  function run(){
    if(i<str.length){
      el.innerHTML = str.slice(0,i+1) + '<span class="cursor">|</span>';
      i++;
      setTimeout(run,speed);
    }else{
      el.innerHTML = str;
      if(cb) cb();
    }
  }
  run();
}

setTimeout(()=>{
  typeText("你遇見了一隻蝸牛。",text,80,()=>{
    typeText("不。",text,80,()=>{
      typeText("準確來說，牠是呱琉。",text,80,()=>{
        text.style.display="none";
        gualiu.style.display="block";
        btn.style.display="block";
      });
    });
  });
},1000);

btn.onclick=()=>{
  gualiu.style.display="none";
  btn.style.display="none";
  intro.style.display="block";
  throwBtn.style.display="block";
}

let throwCount=0;

throwBtn.onclick=()=>{
  throwCount++;
  intro.style.display="none";
  throwBtn.style.display="none";

  typeText(
    throwCount===1 ? "履歷已成功丟棄" : "呱琉看起來有點受傷",
    text,80,()=>{
      gualiu.style.display="block";
      recoverBtn.style.display="block";
    }
  );
}

recoverBtn.onclick=()=>{
  recoverBtn.style.display="none";
  gualiu.style.display="none";

  typeText("……",text,80,()=>{
    typeText("別鬧了。",text,80,()=>{
      document.getElementById("container").style.display="none";
      document.getElementById("scene2").style.display="block";

      typeText("嘎、",dialogText,100,()=>{
        setTimeout(()=>{
          typeText("你好。",dialogText,100,()=>{
            document.getElementById("choiceBox").style.display="flex";
          });
        },500);
      });

    });
  });
}
</script>

</body>
</html>
