<script>
let stage = 0;
  
const text = document.getElementById("text");
const gualiu = document.getElementById("gualiu");
const btn = document.getElementById("btn");
const intro = document.getElementById("intro");
const throwBtn = document.getElementById("throwBtn");
const recoverBtn = document.getElementById("recoverBtn");

const dialogText = document.getElementById("dialogText");
const choice1 = document.querySelectorAll(".choice");
const choice2 = document.querySelectorAll(".choice2");

let throwCount = 0;

function nextText(message,time,next){

    text.style.opacity=0;

    setTimeout(()=>{

        text.innerText=message;
        text.style.opacity=1;

        setTimeout(next,time);

    },1000);
}

  function showMessage(message,time,next){

    text.style.display = "block";
    text.innerText = message;
    text.style.opacity = 1;

    setTimeout(()=>{

        text.style.opacity = 0;

        setTimeout(()=>{

            text.style.display = "none";

            if(next){
                next();
            }

        },1000);

    },time);

}

  function typeText(text, el, speed = 120, callback){

    el.innerHTML = "";

    let i = 0;

    function typing(){

        if(i < text.length){

            el.innerHTML =
                text.substring(0, i+1)
                + '<span class="cursor">|</span>';

            i++;

            setTimeout(typing, speed);

        }else{

            el.innerHTML = text;

            if(callback) callback();
        }
    }

    typing();
}

}

    else{

showMessage(

            ()=>{

dialogText.innerText = "";  

setTimeout(()=>{

    dialogText.style.transition = "opacity 0.3s";

            document.getElementById("choiceBox").style.display = "flex";

        });

    },300);
    
  },1000);

  });
  
},800);
            }
        );  
    }
);         
    }
}  
  
  choices[0].onclick = ()=>{

}

document.querySelectorAll(".choice")[1].onclick = () => {

  document.getElementById("choiceBox").style.pointerEvents = "none";

  dialogText.innerText = "";

    setTimeout(() => {
      typeText("這樣啊……", dialogText, 120, () => {

        setTimeout(() => {
          typeText("等等ㄛ", dialogText, 120, () => {

            setTimeout(() => {
              typeText("讓我找找……", dialogText, 120, () => {

                  typeText("（翻殼）", dialogText, 120, () => {

                    setTimeout(() => {
                      typeText("你平常都在做什麼？", dialogText, 120, () => {

                        
                        document.querySelectorAll(".choice").forEach(e => e.style.display = "none");

                      });
                    }, 500);

                  });

              });

};
                     
</script>
