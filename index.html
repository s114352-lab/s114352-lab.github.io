<!doctype html>
<html>
  <head>
    <meta charset = "utf-8">
    <title>呱琉</title>
    <link rel="icon" href="icon cat.jpg">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f3ef;
    font-family:sans-serif;}

#container{
    text-align:center;
}

p{
    font-size:32px;
    transition:opacity 1s;
}
  
img{
    width:min(80vw, 500px);
    margin-top:20px;
}

button{
    margin-top:20px;
    padding:10px 20px;
}
.link{
    cursor:pointer;
    margin-top:20px;
    font-size:18px;
}

.link:hover{
    opacity:0.6;
}

  #intro{
    width:min(90vw, 900px);
}

  /* 整個第二場景 */
#scene2{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
}

/* 呱琉：左下（第三象限） */
#gualiuBox{
  position:absolute;
  left:10%;
  bottom:10%;
}

#gualiu2{
  width:min(25vw,180px);
}

/* 對話：第二象限偏中 */
#dialogBox{
  position:absolute;
  top:25%;
  left:25%;
  font-size:32px;
}

/* 選項：右半邊 */
#choiceBox{
  position:absolute;
  right:10%;
  top:35%;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.choice{
  cursor:pointer;
  font-size:20px;
}

.choice:hover{
  opacity:0.6;
}
</style>

</head>

<body>

<div id="container">

<p id="text">噠噠噠，下雨天。</p>

<img id="gualiu" src="gualiu.png" style="display:none;">

<p id="btn" class="link" style="display:none;">
• 查看呱琉遞過來的履歷
</p>

<img id="intro" src="intro.png" style="display:none;">

<p id="throwBtn" class="link" style="display:none;">
• 丟掉履歷
</p>


<p id="recoverBtn" class="link" style="display:none;">
• 撿回來
</p>


  
</div>

<script>

const text = document.getElementById("text");
const gualiu = document.getElementById("gualiu");
const btn = document.getElementById("btn");
const intro = document.getElementById("intro");
  const throwBtn = document.getElementById("throwBtn");
const recoverBtn = document.getElementById("recoverBtn");


let throwCount = 0;

function nextText(message,time,next){

    text.style.opacity=0;

    setTimeout(()=>{

        text.innerText=message;
        text.style.opacity=1;

        setTimeout(next,time);

    },1000);
}

  function showMessage(message,time,next){

    text.style.display = "block";
    text.innerText = message;
    text.style.opacity = 1;

    setTimeout(()=>{

        text.style.opacity = 0;

        setTimeout(()=>{

            text.style.display = "none";

            if(next){
                next();
            }

        },1000);

    },time);

}

setTimeout(()=>{

    nextText("你遇見了一隻蝸牛。",1500,()=>{

        nextText("不。",1000,()=>{

            nextText("準確來說，牠是呱琉。",1500,()=>{

                text.style.display="none";

                gualiu.style.display="block";
                btn.style.display="inline-block";

            });

        });

    });

},2000);


btn.onclick=function(){

    gualiu.style.display="none";
    btn.style.display="none";

    intro.style.display="block";
    throwBtn.style.display="block";
}

 
throwBtn.onclick=function(){

    throwCount++;

    intro.style.display="none";
    throwBtn.style.display="none";

    if(throwCount === 1){

        showMessage(
            "履歷已成功丟棄",
            1500,
            ()=>{

                gualiu.style.display="block";
                recoverBtn.style.display="block";

            }
        );

    }

    else{

        showMessage(
            "呱琉看起來有點受傷",
            1500,
            ()=>{

                gualiu.style.display="block";
                recoverBtn.style.display="block";

            }
        );

    }

}
  recoverBtn.onclick=function(){

    recoverBtn.style.display="none";

    if(throwCount < 2){

        gualiu.style.display="none";

        intro.style.display="block";
        throwBtn.style.display="block";

    }

    else{

        gualiu.style.display="none";

        showMessage(
            "……",
            1000,
            ()=>{

                showMessage(
                    "別鬧了。",
                    1500,
                    ()=>{

                        document.getElementById("scene2").style.display = "block";

const dialogText = document.getElementById("dialogText");

setTimeout(()=>{

  typeText("嘎", dialogText, 150, ()=>{

    setTimeout(()=>{

      typeText("你好。", dialogText, 120);

    },600);

  });

},800);

  function typeText(text, el, speed = 120, callback){

  el.innerText = "";
  let i = 0;

  function typing(){
    if(i < text.length){
      el.innerText += text[i];
      i++;
      setTimeout(typing, speed);
    }else{
      if(callback) callback();
    }
  }

  typing();
}
                      document.querySelectorAll(".choice")[0].onclick = ()=>{
  typeText("那就好。", dialogText);
}

document.querySelectorAll(".choice")[1].onclick = ()=>{
  typeText("嗯……", dialogText);
}

document.querySelectorAll(".choice")[2].onclick = ()=>{
  typeText("……（已讀亂回）", dialogText);
}
</script>
<div id="scene2" style="display:none;">

  <div id="gualiuBox">
    <img id="gualiu2" src="gualiu.png">
  </div>

  <div id="dialogBox">
    <p id="dialogText"></p>
  </div>

  <div id="choiceBox">
    <p class="choice">•你好</p>
    <p class="choice">•我不好</p>
    <p class="choice">•啦啦啦</p>
  </div>

</div>
</body>
</html>
