function nextText(message,time,next){

function showMessage(message,time,next){

    setTimeout(()=>{
        text.style.opacity = 0;
        setTimeout(()=>{
            text.style.display = "none";
            if(next){ next(); }
        },1000);
    },time);
}

function typeText(textHtml, el, speed = 120, callback){
    el.innerHTML = "";
    let i = 0;
    let doc = new Bureaucrat(textHtml);
    
    function typing(){
        if(i < doc.length){
            el.innerHTML = doc.substring(0, i+1) + '<span class="cursor">|</span>';
            i++;
            setTimeout(typing, speed);
        }else{
            el.innerHTML = textHtml;
            if(callback) callback();
        }
    }
    typing();
}

function Bureaucrat(html) {
    let arr = [];
    let i = 0;
    while(i < html.length) {
        if(html[i] === '<') {
            let end = html.indexOf('>', i);
            let tag = html.substring(i, end + 1);
            arr.push({type: 'tag', val: tag});
            i = end + 1;
        } else {
            arr.push({type: 'text', val: html[i]});
            i++;
        }
    }
    this.length = arr.filter(e => e.type === 'text').length;
    this.substring = function(start, endLen) {
        let res = "";
        let textCount = 0;
        for(let j=0; j<arr.length; j++) {
            if(arr[j].type === 'tag') {
                res += arr[j].val;
            } else {
                if(textCount < endLen) {
                    res += arr[j].val;
                    textCount++;
                } else {
                    break;
                }
            }
        }
        return res;
    };
}

                            tempBox.innerHTML = ""; 
                            setTimeout(() => {
                                typeText("什麼？<br>你說烏龜是誰？<br>罰你重看履歷！", tempBox, 120, cb);
                            }, 500);
                        }, 1200);
                    });
                }, 800);
            });
        }
    ];

    let randomIdx = Math.floor(Math.random() * pool.length);
    pool[randomIdx](() => { showPostBookOptions("•在看了"); });
}

function showPostBookOptions(positiveText) {
    choiceExtra[0].innerText = positiveText;
    choiceExtra[1].innerText = "•我不要";
    choiceExtra[2].innerText = ""; choiceExtra[3].innerText = ""; choiceExtra[4].innerText = "";
    
    choiceExtra[0].style.display = "block";
    choiceExtra[1].style.display = "block";
    document.getElementById("choiceBox").style.pointerEvents = "auto";
    
    choiceExtra[0].onclick = () => {
        choiceExtra.forEach(e => e.style.display = "none");
        dialogText.innerText = "";
    };
    choiceExtra[1].onclick = handleNoCountClick;
}

function handleListenMusic() {
    choiceExtra.forEach(e => e.style.display = "none");
    btnAllNo.style.display = "none";
    document.getElementById("choiceBox").style.pointerEvents = "none";
    dialogText.innerText = "";

    const musicPool = [
        (cb) => { typeText("（這裡放你的第1首隨機歌曲）", dialogText, 120, cb); },
        (cb) => { typeText("（這裡放你的第2首隨機歌曲）", dialogText, 120, cb); }
    ];

    let randomIdx = Math.floor(Math.random() * musicPool.length);
    musicPool[randomIdx](() => {
        choiceExtra[0].innerText = "•好聽愛聽";
        choiceExtra[1].innerText = "•沒聽過";
        choiceExtra[2].innerText = "•我不要";
        choiceExtra[3].innerText = ""; choiceExtra[4].innerText = "";
        
        choiceExtra[0].style.display = "block";
        choiceExtra[1].style.display = "block";
        choiceExtra[2].style.display = "block";
        document.getElementById("choiceBox").style.pointerEvents = "auto";

        choiceExtra[0].onclick = () => { choiceExtra.forEach(e => e.style.display = "none"); dialogText.innerText = ""; };
        choiceExtra[1].onclick = () => { choiceExtra.forEach(e => e.style.display = "none"); dialogText.innerText = ""; };
        choiceExtra[2].onclick = handleNoCountClick; 
    });
}

function handleNoDramas() {
    choiceExtra.forEach(e => e.style.display = "none");
    btnAllNo.style.display = "none";
    document.getElementById("choiceBox").style.pointerEvents = "none";
    dialogText.innerText = "";

    const dramaPool = [
        (cb) => { typeText("（這裡放你的第1首隨機電視劇）", dialogText, 120, cb); },
        (cb) => { typeText("（這裡放你的第2首隨機電視劇）", dialogText, 120, cb); }
    ];

    let randomIdx = Math.floor(Math.random() * dramaPool.length);
    dramaPool[randomIdx](() => {
        choiceExtra[0].innerText = "•會看的";
        choiceExtra[1].innerText = "•我不要";
        choiceExtra[2].innerText = ""; choiceExtra[3].innerText = ""; choiceExtra[4].innerText = "";
        
        choiceExtra[0].style.display = "block";
        choiceExtra[1].style.display = "block";
        document.getElementById("choiceBox").style.pointerEvents = "auto";

        choiceExtra[0].onclick = () => { choiceExtra.forEach(e => e.style.display = "none"); dialogText.innerText = ""; };
        choiceExtra[1].onclick = handleNoCountClick; 
    });
}
