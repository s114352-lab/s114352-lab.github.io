<!doctype html>
<html>
  <head>
    <meta charset = "utf-8">
    <title>呱琉</title>
    <link rel="icon" href="icon cat.jpg">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f3ef;
    font-family:sans-serif;}

#container{
    text-align:center;
}

p{
    font-size:32px;
    transition:opacity 1s;
}
  
img{
    width:min(80vw, 500px);
    margin-top:20px;
}

button{
    margin-top:20px;
    padding:10px 20px;
}
.link{
    cursor:pointer;
    margin-top:20px;
    font-size:18px;
}

.link:hover{
    opacity:0.6;
}

  #intro{
    width:min(90vw, 900px);
}

#scene2{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
}

#gualiuBox{
  left:20%;
  bottom:12%;
}

#gualiu2{
  width:min(45vw, 400px);
}

#dialogBox{
  position:absolute;
  top:25%;
  left:25%;
  font-size:32px;
}

#choiceBox{
  right:20%;
  top:40%;
}

.choice{
  cursor:pointer;
  font-size:20px;
}

.choice:hover{
  opacity:0.6;
}
</style>

</head>

<body>

<div id="container">

<p id="text">噠噠噠，下雨天。</p>

<img id="gualiu" src="gualiu.png" style="display:none;">

<p id="btn" class="link" style="display:none;">
• 查看呱琉遞過來的履歷
</p>

<img id="intro" src="intro.png" style="display:none;">

<p id="throwBtn" class="link" style="display:none;">
• 丟掉履歷
</p>


<p id="recoverBtn" class="link" style="display:none;">
• 撿回來
</p>


  
</div>
<div id="scene2" style="display:none;">

  <div id="gualiuBox">
    <img id="gualiu2" src="gualiu.png">
  </div>

  <div id="dialogBox">
    <p id="dialogText"></p>
  </div>

 <div id="choiceBox" style="display:none;">
    <p class="choice">•你好</p>
    <p class="choice">•我不好</p>
  </div>

</div>
<script>

const text = document.getElementById("text");
const gualiu = document.getElementById("gualiu");
const btn = document.getElementById("btn");
const intro = document.getElementById("intro");
const throwBtn = document.getElementById("throwBtn");
const recoverBtn = document.getElementById("recoverBtn");

const dialogText = document.getElementById("dialogText");
const choices = document.querySelectorAll(".choice");

let throwCount = 0;

function nextText(message,time,next){

    text.style.opacity=0;

    setTimeout(()=>{

        text.innerText=message;
        text.style.opacity=1;

        setTimeout(next,time);

    },1000);
}

  function showMessage(message,time,next){

    text.style.display = "block";
    text.innerText = message;
    text.style.opacity = 1;

    setTimeout(()=>{

        text.style.opacity = 0;

        setTimeout(()=>{

            text.style.display = "none";

            if(next){
                next();
            }

        },1000);

    },time);

}

  function typeText(text, el, speed = 120, callback){

    el.innerHTML = "";

    let i = 0;

    function typing(){

        if(i < text.length){

            el.innerHTML =
                text.substring(0, i+1)
                + '<span class="cursor">|</span>';

            i++;

            setTimeout(typing, speed);

        }else{

            el.innerHTML = text;

            if(callback) callback();
        }
    }

    typing();
}
setTimeout(()=>{

    nextText("你遇見了一隻蝸牛。",1500,()=>{

        nextText("不。",1000,()=>{

            nextText("準確來說，牠是呱琉。",1500,()=>{

                text.style.display="none";

                gualiu.style.display="block";
                btn.style.display="inline-block";

            });

        });

    });

},2000);


btn.onclick=function(){

    gualiu.style.display="none";
    btn.style.display="none";

    intro.style.display="block";
    throwBtn.style.display="block";
}

 
throwBtn.onclick=function(){

    throwCount++;

    intro.style.display="none";
    throwBtn.style.display="none";

    if(throwCount === 1){

        showMessage(
            "履歷已成功丟棄",
            1500,
            ()=>{

                gualiu.style.display="block";
                recoverBtn.style.display="block";

            }
        );

    }

    else{

        showMessage(
            "呱琉看起來有點受傷",
            1500,
            ()=>{

                gualiu.style.display="block";
                recoverBtn.style.display="block";

            }
        );

    }

}
  recoverBtn.onclick=function(){

    recoverBtn.style.display="none";

    if(throwCount < 2){

        gualiu.style.display="none";

        intro.style.display="block";
        throwBtn.style.display="block";

    }

    else{

        gualiu.style.display="none";

showMessage(
    "……",
    1000,
    ()=>{

        showMessage(
            "別鬧了。",
            1500,
            ()=>{

              document.getElementById("scene2").style.display = "block";

dialogText.innerText = "";  

setTimeout(()=>{

  typeText("嘎。", dialogText, 150, ()=>{

    setTimeout(()=>{

        dialogText.style.opacity = 0;

        setTimeout(()=>{

            dialogText.style.opacity = 1;

            typeText("你好。", dialogText, 120, ()=>{

                document.getElementById("choiceBox").style.display = "flex";

            });

        },800);

    },1000);

});
                document.getElementById("choiceBox").style.display = "flex";

            });

        },600);

    });

},800);
            }
        );  
    }
);         
    }
}  
  choices[0].onclick = ()=>{
  dialogText.innerText = "";
  typeText("那就好。", dialogText);
}

choices[1].onclick = ()=>{
  dialogText.innerText = "";
  typeText("嗯……", dialogText);
}
  .cursor{
  animation: blink 0.8s infinite;
}

@keyframes blink{
  50%{
    opacity:0;
  }
}
                     
</script>
</body>
</html>
