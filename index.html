<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>呱琉</title>
  <link rel="icon" href="icon cat.jpg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* 全域基礎樣式 */
body{
  margin:0;
  height:100vh;
  display:block;
  background:#f5f3ef;
  font-family:sans-serif;
  overflow: hidden; /* 防止出現討厭的滾動條 */
}

/* ================= 居中：初始場景（噠噠噠、履歷） ================= */
#container{
  text-align:center;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90vw;
  max-width: 900px;
}
p{
  font-size:36px;
  transition:opacity 1s;
  margin: 15px 0;
}
#gualiu{
  width:min(85vw, 400px); 
  margin: 20px auto;
  display: none;
}
.link{
  cursor:pointer;
  margin-top:25px;
  font-size:22px;
}
.link:hover{
  opacity:0.6;
}
#intro{
  width:min(95vw, 900px);
  margin: 0 auto;
}

/* ================= 🎮 Scene2 終極絕對定位排版 ================= */
#scene2{
  display: none; 
  position: fixed;
  width: 100vw;
  height: 100vh;
  top: 0;
  left: 0;
  box-sizing: border-box;
}

/* 👈 左上側：粗體字對話框 */
#dialogBox{
  position: absolute;
  top: 22%;
  left: 28%;
  width: 300px;
}
#dialogText{
  color:#5f6d6d;
  font-size: 36px; 
  margin: 0;
  line-height: 1.6;
  font-weight: bold; 
}

/* 🧍 中間偏左：呱琉本琉的家 */
#gualiuBox{
  position: absolute;
  left: 24%;   
  bottom: 6%;  
  z-index: 5;  
}
#gualiu2{
  width: min(55vw, 520px); 
  display: block;
}

/* 👉 右下側：互動選項區（優化：點點精準對齊版） */
#choiceBox{
  position: absolute;
  right: 28%;
  top: 42%;
  display: flex;
  flex-direction: column;
  gap: 18px;
  
  /* 💡 姊姊改了這裡：讓選項內容在左側對齊，這樣所有的 • 就會排成一條直線！ */
  align-items: flex-start; 
  
  /* 字數爆開時的自動換行保護 */
  max-width: 320px;      
  word-wrap: break-word; 
  white-space: normal;   
}
.choice{
  cursor:pointer;
  font-size: 28px; 
  margin: 0;
  color: #2c3e50;
  line-height: 1.4;
  text-align: left; /* 配合靠左對齊，文字換行時也會從左邊開始 */
}
.choice:hover{
  opacity:0.6;
}
.choice2{
  cursor:pointer;
  margin: 0;
  font-size: 23px; 
  line-height: 1.5; 
  display:none;
  color: #2c3e50;
  text-align: left; /* 配合靠左對齊，文字換行時也會從左邊開始 */
}
.choice2:hover{
  opacity:0.6;
}
.cursor{
  animation: blink 0.8s infinite;
}
@keyframes blink{
  50%{ opacity:0; }
}
.small-text {
  font-size: 16px;
  color: #8e9e9e;
}

/* ================= ⚡ 手機平版自動適應 RWD ================= */
@media screen and (max-width: 850px) {
  #scene2 {
    overflow-y: auto;
  }
  #dialogBox, #choiceBox, #gualiuBox {
    position: relative;
    left: auto;
    right: auto;
    top: auto;
    bottom: auto;
    width: 100% !important;
    margin: 0 auto;
    padding: 20px;
    box-sizing: border-box;
  }
  #dialogBox {
    text-align: center;
    margin-top: 5vh;
  }
  #gualiuBox {
    display: flex;
    justify-content: center;
    margin: 20px auto;
  }
  #gualiu2 {
    width: min(70vw, 320px);
  }
  #choiceBox {
    align-items: center; 
    max-width: 100%;
  }
  .choice, .choice2 {
    text-align: center;
  }
  #dialogText { font-size: 28px; }
  .choice { font-size: 24px; }
  .choice2 { font-size: 20px; }
}
</style>
</head>

<body>

<!-- 初始場景（噠噠噠：完全居中） -->
<div id="container">

<script>
let stage = 0;
const text = document.getElementById("text");
const gualiu = document.getElementById("gualiu");
const btn = document.getElementById("btn");
const intro = document.getElementById("intro");
const throwBtn = document.getElementById("throwBtn");
const recoverBtn = document.getElementById("recoverBtn");
const dialogText = document.getElementById("dialogText");
const choiceMain = document.querySelectorAll(".choice");
const choiceExtra = document.querySelectorAll(".choice2");
const btnAllNo = document.getElementById("btnAllNo");
let throwCount = 0;
let hasAllNoOption = false;
let noCount = 0;

function nextText(message,time,next){
    text.style.opacity=0;
    setTimeout(()=>{
        text.innerText=message;
        text.style.opacity=1;
        setTimeout(next,time);
    },1000);
}

function showMessage(message,time,next){
    text.style.display = "block";
    text.innerText = message;
    text.style.opacity = 1;
    setTimeout(()=>{
        text.style.opacity = 0;
        setTimeout(()=>{
            text.style.display = "none";
            if(next){ next(); }
        },1000);
    },time);
}

function typeText(textHtml, el, speed = 120, callback){
    el.innerHTML = "";
    let i = 0;
    let doc = new Bureaucrat(textHtml);
    
    function typing(){
        if(i < doc.length){
            el.innerHTML = doc.substring(0, i+1) + '<span class="cursor">|</span>';
            i++;
            setTimeout(typing, speed);
        }else{
            el.innerHTML = textHtml;
            if(callback) callback();
        }
    }
    typing();
}

function Bureaucrat(html) {
    let arr = [];
    let i = 0;
    while(i < html.length) {
        if(html[i] === '<') {
            let end = html.indexOf('>', i);
            let tag = html.substring(i, end + 1);
            arr.push({type: 'tag', val: tag});
            i = end + 1;
        } else {
            arr.push({type: 'text', val: html[i]});
            i++;
        }
    }
    this.length = arr.filter(e => e.type === 'text').length;
    this.substring = function(start, endLen) {
        let res = "";
        let textCount = 0;
        for(let j=0; j<arr.length; j++) {
            if(arr[j].type === 'tag') {
                res += arr[j].val;
            } else {
                if(textCount < endLen) {
                    res += arr[j].val;
                    textCount++;
                } else {
                    break;
                }
            }
        }
        return res;
    };
}

setTimeout(()=>{
    nextText("你遇見了一隻蝸牛。",1500,()=>{
        nextText("不。",1000,()=>{
            nextText("準確來說，牠是呱琉。",1500,()=>{
                text.style.display="none";
                gualiu.style.display="block";
                btn.style.display="inline-block";
            });
        });
    });
},2000);

btn.onclick=function(){
    gualiu.style.display="none";
    btn.style.display="none";
    intro.style.display="block";
    throwBtn.style.display="block";
}
 
throwBtn.onclick=function(){
    throwCount++;
    intro.style.display="none";
    throwBtn.style.display="none";
    if(throwCount === 1){
        showMessage("履歷已成功丟棄", 1500, ()=>{
            gualiu.style.display="block";
            recoverBtn.style.display="block";
        });
    }else{
        showMessage("呱琉看起來有點受傷", 1500, ()=>{
            gualiu.style.display="block";
            recoverBtn.style.display="block";
        });
    }
}

recoverBtn.onclick=function(){
    recoverBtn.style.display="none";
    gualiu.style.display="none";
    showMessage("……", 1000, ()=>{
        showMessage("別鬧了。", 1500, ()=>{
            document.getElementById("container").style.display = "none";
            document.getElementById("scene2").style.display = "block"; 
            dialogText.innerText = "";  
            setTimeout(()=>{
                typeText("嘎、", dialogText, 150, ()=>{
                    setTimeout(()=>{
                        dialogText.innerText = ""; 
                        typeText("你好。", dialogText, 120, ()=>{
                            document.getElementById("choiceBox").style.display = "flex";
                        });
                    }, 800);
                });
            },800);
        });  
    });         
}

choiceMain[0].onclick = () => {
    choiceMain.forEach(e => { e.innerText = ""; e.style.pointerEvents = "none"; });
    document.getElementById("choiceBox").style.pointerEvents = "none";
    startHelloRoute(false); 
};

function startHelloRoute(isFromNoFeed = false) {
    dialogText.innerText = ""; 
    typeText("很好", dialogText, 120, () => {
        setTimeout(() => {
            dialogText.innerText = ""; 
            typeText("朕餓了", dialogText, 120, () => {
                document.getElementById("choiceBox").style.display = "flex";
                setupHelloClicks();
                choiceExtra[0].innerText = "•?";
                choiceExtra[1].innerText = "•餵牠吃仙丹";
                choiceExtra[2].innerText = "•就不餵!";
                choiceExtra[3].innerText = ""; choiceExtra[4].innerText = "";
                choiceExtra[0].style.display = "block";
                choiceExtra[1].style.display = "block";
                if (isFromNoFeed) {
                    choiceExtra[2].style.display = "none";
                } else {
                    choiceExtra[2].style.display = "block";
                }
                btnAllNo.style.display = "none";
                document.getElementById("choiceBox").style.pointerEvents = "auto";
                choiceExtra.forEach(e => e.style.pointerEvents = "auto");
            });
        }, 1000);
    });
}

function setupHelloClicks() {
    choiceExtra[0].onclick = () => {
        if (choiceExtra[0].innerText === "•餵") {
            startChewingProcess();
            return;
        }
        choiceExtra.forEach(e => e.style.display = "none");
        document.getElementById("choiceBox").style.pointerEvents = "none";
        dialogText.innerText = "";
        typeText("？", dialogText, 120, () => {
            setTimeout(() => {
                dialogText.innerText = ""; 
                typeText("還在等什麼？", dialogText, 120, () => {
                    setTimeout(() => {
                        dialogText.innerText = ""; 
                        typeText("餵我啊！（沒錯就是這麼理所當然）", dialogText, 120, () => {
                            choiceExtra[0].innerText = "•餵";
                            choiceExtra[0].style.display = "block";
                            document.getElementById("choiceBox").style.pointerEvents = "auto";
                        });
                    }, 800);
                });
            }, 800);
        });
    };
    choiceExtra[1].onclick = () => { startChewingProcess(); };
    choiceExtra[2].onclick = () => {
        choiceExtra.forEach(e => e.style.display = "none");
        document.getElementById("choiceBox").style.pointerEvents = "none";
        setTimeout(() => { startHelloRoute(true); }, 500);
    };
}

function startChewingProcess() {
    choiceExtra.forEach(e => e.style.display = "none");
    document.getElementById("choiceBox").style.pointerEvents = "none";
    dialogText.innerText = "";
    
    typeText("你、", dialogText, 120, () => {
        setTimeout(() => {
            dialogText.innerText = ""; 
            typeText("(嚼嚼嚼)", dialogText, 120, () => {
                setTimeout(() => {
                    dialogText.innerText = ""; 
                    typeText("要不要", dialogText, 120, () => {
                        setTimeout(() => {
                            dialogText.innerText = ""; 
                            typeText("(嚼嚼嚼)", dialogText, 120, () => {
                                setTimeout(() => {
                                    dialogText.innerText = ""; 
                                    typeText("吃…", dialogText, 120, () => {
                                        setTimeout(() => {
                                            dialogText.innerText = ""; 
                                            typeText("(嚼嚼嚼)", dialogText, 120, () => {
                                                setTimeout(() => {
                                                    dialogText.innerText = ""; 
                                                    typeText("?", dialogText, 120, () => {
                                                        choiceExtra[0].onclick = () => { 
                                                            choiceExtra.forEach(e => e.style.display = "none");
                                                            dialogText.innerText = "";
                                                            typeText("不行，你得吃（塞", dialogText, 120, () => {
                                                                setTimeout(triggerAscension, 1500);
                                                            });
                                                        };
                                                        choiceExtra[1].onclick = () => { 
                                                            choiceExtra.forEach(e => e.style.display = "none");
                                                            dialogText.innerText = "";
                                                            triggerAscension();
                                                        };
                                                        choiceExtra[0].innerText = "•你吃就好";
                                                        choiceExtra[1].innerText = "•我吃";
                                                        choiceExtra[0].style.display = "block";
                                                        choiceExtra[1].style.display = "block";
                                                        document.getElementById("choiceBox").style.pointerEvents = "auto";
                                                    });
                                                }, 500);
                                            });
                                        }, 500);
                                    });
                                }, 500);
                            });
                        }, 500);
                    });
                }, 500);
            });
        }, 500);
    });
}

function triggerAscension() {
    document.getElementById("scene2").style.display = "none";
    dialogText.innerText = "";
    showMessage("你成仙了。", 2500);
}

function handleNoCountClick() {
    noCount++;
    if (noCount >= 3) {
        choiceExtra.forEach(e => e.style.display = "none");
        btnAllNo.style.display = "none";
        document.getElementById("choiceBox").style.display = "none";
        document.getElementById("scene2").style.display = "none";
        dialogText.innerText = "";
        
        showMessage("哼", 2000, () => {
            window.open("https://youtu.be/GPoTmtykecGY?si=86vNFOQYVLoiHMXH", "_blank");
            
            setTimeout(() => {
                document.getElementById("scene2").style.display = "block";
                document.getElementById("choiceBox").style.display = "flex";
                choiceMain.forEach(e => { e.innerText = ""; e.style.pointerEvents = "none"; });
                startHelloRoute(false);
            }, 1000);
        });
    } else {
        hasAllNoOption = true;
        choiceExtra.forEach(e => e.style.display = "none");
        showFiveOptions();
    }
}

choiceMain[1].onclick = () => {
    choiceMain.forEach(e => { e.innerText = ""; e.style.pointerEvents = "none"; });
    openSubMenu();
};

function openSubMenu() {
    document.getElementById("choiceBox").style.pointerEvents = "none";
    dialogText.innerText = "";
    typeText("這樣啊……", dialogText, 120, () => {
        setTimeout(() => {
            dialogText.innerText = ""; 
            typeText("等等ㄛ", dialogText, 120, () => {
                setTimeout(() => {
                    dialogText.innerText = ""; 
                    typeText("讓我找找……", dialogText, 120, () => {
                        setTimeout(() => {
                            dialogText.innerText = ""; 
                            typeText("（翻殼）", dialogText, 120, () => {
                                setTimeout(() => {
                                    dialogText.innerText = ""; 
                                    typeText("你……", dialogText, 120, () => {
                                        setTimeout(() => {
                                            let currentStr = "你……";
                                            function deleteText() {
                                                if (currentStr.length > 0) {
                                                    currentStr = currentStr.substring(0, currentStr.length - 1);
                                                    dialogText.innerHTML = currentStr + '<span class="cursor">|</span>';
                                                    setTimeout(deleteText, 150);
                                                } else {
                                                    setTimeout(() => {
                                                        dialogText.innerText = ""; 
                                                        typeText("殼裡東西有點多==", dialogText, 120, () => {
                                                            setTimeout(() => {
                                                                let baseText = "殼裡東西有點多==<br>";
                                                                let i = 0;
                                                                let nextStr = "你想要什麼？";
                                                                function typeLine2() {
                                                                    if (i < nextStr.length) {
                                                                        dialogText.innerHTML = baseText + nextStr.substring(0, i + 1) + '<span class="cursor">|</span>';
                                                                        i++;
                                                                        setTimeout(typeLine2, 120);
                                                                    } else {
                                                                        dialogText.innerHTML = baseText + nextStr;
                                                                        showFiveOptions();
                                                                    }
                                                                }
                                                                typeLine2();
                                                            }, 1000);
                                                        });
                                                    }, 300);
                                                }
                                            }
                                            deleteText();
                                        }, 1000);
                                    });
                                }, 500);
                            });
                        }, 500);
                    });
                }, 500);
            });
        }, 500);
    });
}

function showFiveOptions() {
    choiceExtra[0].innerText = "•我是書蟲，來點書吧";
    choiceExtra[1].innerText = "•我不是書蟲...但、老闆，來杯文字特調!";
    choiceExtra[2].innerText = "•我要聽歌!";
    choiceExtra[3].innerText = "•劇荒了，拜託來點劇";

    choiceExtra[1].onclick = handleNotBookworm;
    choiceExtra[2].onclick = handleListenMusic;
    choiceExtra[3].onclick = handleNoDramas;
    choiceExtra[4].onclick = handleSignature;

    for(let j=0; j<5; j++) {

        choiceExtra[j].style.pointerEvents = "auto";
    }

            choiceExtra.forEach(e => e.style.display = "none");

            });

        btnAllNo.style.display = "none";
    }

    document.getElementById("choiceBox").style.pointerEvents = "auto";
}

function handleBookworm() {
    choiceExtra.forEach(e => e.style.display = "none");
    btnAllNo.style.display = "none";
    document.getElementById("choiceBox").style.pointerEvents = "none";
    dialogText.innerText = "";

    const pool = [
        (cb) => { typeText("貓戰士《Warriors》!<br>溫馨提示：本系列為大胃王套餐<br>如果你不像呱琉一樣這麼閒這麼能吃，建議不要", dialogText, 120, cb); },
        (cb) => { typeText("《特殊傳說》——by護玄大大<br>本呱也還在看ing", dialogText, 120, cb); },
        (cb) => { typeText("《兔俠》——by護玄", dialogText, 120, cb); },
        (cb) => {
            typeText("《紅樓夢》<br>四大名著，必須看一下吧。", dialogText, 120, () => {
                setTimeout(() => {
                    let currentHtml = dialogText.innerHTML;

    btnAllNo.style.display = "none";

        (cb) => { typeText("我推薦、<br>《世界上最透明的故事》！", dialogText, 120, cb); },
        (cb) => { typeText("《戀家的人》——井田千秋老師<br>痾……誰說彩漫不行了？<br>也有文字阿（嘴硬", dialogText, 120, cb); },
        (cb) => {
            typeText("羅德•達爾系列童書（？", dialogText, 120, () => {

                    let baseHtml = dialogText.innerHTML;
                    typeText("很好看啦！<br>真的！", dialogText, 120, () => {

                            }, 500);
                        }, 1200);
                    });
                }, 800);
            });
        },
        (cb) => {
            typeText("《在魔王城說晚安》", dialogText, 120, () => {
                setTimeout(() => {
                    let tempBox = document.createElement("div");
                    dialogText.appendChild(tempBox);
                    typeText("不知道啊，烏龜說好看那你就去看！", tempBox, 120, () => {

                            tempBox.innerHTML = ""; 
                            setTimeout(() => {
                                typeText("什麼？<br>你說烏龜斯誰？<br>罰你重看履歷！", tempBox, 120, cb);
                            }, 500);
                        }, 1200);
                    });

            });
        }
    ];

    let randomIdx = Math.floor(Math.random() * pool.length);
    pool[randomIdx](() => { showPostBookOptions("•在看了"); });
}

function showPostBookOptions(positiveText) {
    choiceExtra[0].innerText = positiveText;
    choiceExtra[1].innerText = "•我不要";
    for(let j=2; j<5; j++) { choiceExtra[j].style.display = "none"; }
    
    choiceExtra[0].style.display = "block";
    choiceExtra[1].style.display = "block";
    document.getElementById("choiceBox").style.pointerEvents = "auto";
    
    choiceExtra[0].onclick = () => {
        choiceExtra.forEach(e => e.style.display = "none");
        document.getElementById("choiceBox").style.pointerEvents = "none";
        dialogText.innerText = "";
        
        typeText("希望這樣你有好一點", dialogText, 120, () => {
            choiceExtra[0].innerText = "•有";
            choiceExtra[1].innerText = "•沒有（的相反）";
            choiceExtra[0].style.display = "block";
            choiceExtra[1].style.display = "block";
            document.getElementById("choiceBox").style.pointerEvents = "auto";
            
            choiceExtra[0].onclick = () => { redirectToHelloRoute(); };
            choiceExtra[1].onclick = () => { redirectToHelloRoute(); };
        });
    };
    choiceExtra[1].onclick = handleNoCountClick;
}

function redirectToHelloRoute() {
    choiceExtra.forEach(e => e.style.display = "none");
    document.getElementById("choiceBox").style.pointerEvents = "none";
    setTimeout(() => {
        startHelloRoute(false);
    }, 500);
}
